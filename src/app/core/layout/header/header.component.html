<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 lg:px-8 sticky top-0 z-30 shadow-sm">
  
  <div class="flex items-center gap-4">
    <button 
      (click)="layoutState.toggleMobileSidebar()"
      class="md:hidden text-gray-600 hover:text-gray-900 focus:outline-none">
      <i class="pi pi-bars text-xl"></i>
    </button>
    <h2 class="text-lg font-semibold text-gray-800 tracking-tight hidden sm:block">Overview</h2>
  </div>

  <div class="flex items-center gap-4 sm:gap-6">
    <button class="relative text-gray-400 hover:text-gray-600 transition-colors hidden sm:block">
      <i class="pi pi-bell text-xl"></i>
    </button>

    <div class="hidden sm:block h-6 w-px bg-gray-200"></div>

    <div class="flex items-center gap-3">
      <div class="flex flex-col items-end">
        <span class="text-sm font-bold text-gray-900 leading-none mb-1">{{ authState.currentUser() }}</span>
        <span class="text-xs font-bold text-gray-400 uppercase tracking-wide leading-none">
          ID: {{ authState.employeeProfileId() }}
        </span>
      </div>
      <div class="w-9 h-9 bg-[#0A0A0A] rounded flex items-center justify-center cursor-pointer hover:bg-gray-800 transition-colors shadow-sm">
        <i class="pi pi-user text-white text-sm"></i>
      </div>
    </div>

    <button (click)="logout()" class="text-gray-400 hover:text-red-600 transition-colors ml-2" title="Sign Out">
      <i class="pi pi-sign-out text-xl"></i>
    </button>
  </div>
</header>
